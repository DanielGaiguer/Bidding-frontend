<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Home</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>
<body class="bg-body-tertiary d-flex flex-column min-vh-100">

    <div th:replace="layout/header :: header"></div>

    <main class="container flex-grow-1 d-flex justify-content-center align-items-center">

        <div class="card shadow-lg border-0 rounded-4 p-4" style="max-width: 600px; width: 100%;">

            <div class="card-body text-center">

                <h1 class="fw-bold mb-2 text-primary">
                    Bem-vindo 👋
                </h1>

                <p class="text-muted mb-4">
                    Acesse as funcionalidades do sistema através das opções abaixo.
                </p>

                <div class="d-grid gap-3">

                    <div th:if="${session.role == 'COMPRADOR'}">

                        <a
                            th:href="@{/editais/criar}"
                            class="btn btn-success btn-lg shadow-sm w-100">

                            ➕ Criar Edital

                        </a>
                        


                    </div>
                    
                    <div th:if="${session.role != null}">
                        <a
                            th:href="@{/editais}"
                            class="btn btn-primary btn-lg shadow-sm w-100">

                            📋 Ver Editais

                        </a>
                    </div>
                    
                    <div th:if="${session.role == null}">
                        <p class="btn btn-lg shadow-sm w-100 btn-secondary">Faça login para acessar os editais</p>
                    </div>

                </div>

            </div>

        </div>

    </main>
    <div th:replace="layout/footer :: footer"></div>

</body>
</html>
