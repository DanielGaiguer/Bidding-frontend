<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Editais</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-body-tertiary d-flex flex-column min-vh-100">

<div th:replace="layout/header :: header"></div>

<div class="container py-5 flex-grow-1">

    <div th:if="${session.role != 'COMPRADOR'}"
         class="alert alert-danger text-center shadow-sm">
        <h4 class="mb-0">Acesso negado</h4>
    </div>

    <div th:if="${session.role == 'COMPRADOR'}">

        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Cadastrar Edital</h4>
                    </div>

                    <div class="card-body">

                        <form action="/editais/criar" method="post">

                            <div class="mb-3">
                                <label class="form-label">Título</label>
                                <input type="text"
                                       name="titulo"
                                       class="form-control"
                                       placeholder="Digite o título">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Descrição</label>
                                <textarea name="descricao"
                                          class="form-control"
                                          rows="4"
                                          placeholder="Digite a descrição"></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Data de fechamento</label>
                                <input type="date"
                                       name="dataFechamento"
                                       class="form-control">
                            </div>

                            <button type="submit"
                                    class="btn btn-success w-100">
                                Salvar Edital
                            </button>

                        </form>

                    </div>
                </div>

            </div>
        </div>

    </div>

</div>

<div th:replace="layout/footer :: footer"></div>

</body>
</html>
