<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100 ">
        <div class="card shadow p-4" style="width: 400px;">
            
            <button type="button" 
                    class="btn btn-secondary btn-md position-absolute top-0 start-0 m-3 mb-5"
                    onclick="history.back()">
                Voltar
            </button>

            <h2 class="text-center mb-4 mt-4">
                Login
            </h2>
            
            <div th:if="${mensagemErro}" class="alert alert-danger">
                <span th:text="${mensagemErro}"></span>
            </div>

            <form th:action="@{/login}" method="post" th:object="${user}">
                <div class="mb-3">
                    <label class="form-label">
                        Email
                    </label>

                    <input
                        type="email"
                        name="email"
                        id="email"
                        class="form-control"
                        placeholder="Digite seu email"
                        required
                        oninput="validarCampos()"
                        th:class="${#fields.hasErrors('email')} ? 'form-control is-invalid' : 'form-control'"
                        >
                </div>
                <div th:if="${#fields.hasErrors('email')}" class="invalid-feedback">[[${#fields.errors('email')}]]</div>
                

                <div class="mb-3">
                    <label class="form-label">
                        Senha
                    </label>

                    <input
                        type="password"
                        name="senha"
                        id="senha"
                        class="form-control"
                        placeholder="Digite sua senha"
                        oninput="validarCampos()"
                        required>
                </div>

                <button
                    type="submit"
                    id="btnLogar"
                    class="btn btn-primary w-100" disabled>
                    Entrar
                </button>

            </form>

            <div class="text-center mt-3">
                <a
                    th:href="@{/registrar}"
                    class="text-decoration-none">
                    Criar conta
                </a>

            </div>
        </div>
    </div>
    <script>
    function validarCampos() {
        const senha = document.getElementById("senha").value;
        const email = document.getElementById("email").value;
        const botao = document.getElementById("btnLogar");

        if (email === "" || senha === "" || senha.length < 6 || email.length < 8) {
            botao.disabled = true;
        } else {
            botao.disabled = false;
        }
    }
    </script>
</body>
</html>
