<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body{
            font-family: Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f2f2f2;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:10px;
            width:320px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:10px;
            background:#2563eb;
            color:white;
            border:none;
            cursor:pointer;
        }

        a{
            display:block;
            margin-top:10px;
            text-align:center;
        }

        .error{
            color:red;
            margin-bottom:10px;
        }
    </style>
</head>
    <body>

    <div class="card">

        <h2>Login</h2>

        <div th:if="${param.error}" class="error">
            Usuário ou senha inválidos
        </div>

        <form th:action="@{/api/login}" method="post">

            <input
                type="email"
                name="email"
                placeholder="Email"
                required>

            <input
                type="password"
                name="senha"
                placeholder="Senha"
                required>

            <button type="submit">
                Entrar
            </button>

        </form>

        <a th:href="@{/register}">
            Criar conta
        </a>

    </div>

    </body>
</html>
