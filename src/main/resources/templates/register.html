<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>

    <style>
        body{
            font-family: Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f2f2f2;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:10px;
            width:320px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        input, select{
            width:100%;
            padding:10px;
            margin:8px 0;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:10px;
            background:#16a34a;
            color:white;
            border:none;
            cursor:pointer;
        }

        a{
            display:block;
            margin-top:10px;
            text-align:center;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>Cadastro</h2>

    <form th:action="@{/registrar}" method="post">

        <input
            type="text"
            name="nome"
            placeholder="Nome"
            required>

        <input
            type="email"
            name="email"
            placeholder="Email"
            required>

        <input
            type="password"
            name="senha"
            placeholder="Senha"
            required>

        <select name="role" required>
            <option value="">
                Tipo de usuário
            </option>
            <option value="COMPRADOR">
                Comprador
            </option>
            <option value="FORNECEDOR">
                Fornecedor
            </option>
        </select>

        <button type="submit">
            Registrar
        </button>

    </form>

    <a th:href="@{/login}">
        Voltar para login
    </a>

</div>

</body>
</html>
