<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Detalhes do Edital</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-body-tertiary d-flex flex-column min-vh-100">

    <div th:replace="layout/header :: header"></div>

    <main class="container my-5 flex-grow-1">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-4">
                
                <div class="d-flex align-items-center gap-3 mb-4">

                    <a th:href="@{/editais}" class="btn btn-secondary btn-sm">
                        Voltar
                    </a>

                    <h2 class="text-primary fw-bold mb-0">
                        📄 Detalhes do Edital
                    </h2>

                </div>

                <div th:if="${edital != null}">

                    <h3
                        class="fw-semibold mb-3"
                        th:text="${edital.titulo}">
                        Título
                    </h3>

                    <div class="mb-3">

                        <p class="mb-2">
                            <strong>Descrição:</strong>
                        </p>

                        <p class="text-muted"
                           th:text="${edital.descricao}">
                        </p>

                    </div>

                    <div class="mb-3">

                        <strong>Status:</strong>

                        <span
                            th:if="${edital.status == 'ABERTO'}"
                            class="badge bg-success ms-2">

                            ABERTO

                        </span>

                        <span
                            th:if="${edital.status == 'ENCERRADO'}"
                            class="badge bg-danger ms-2">

                            ENCERRADO

                        </span>

                    </div>

                    <div class="mb-4">

                        <strong>Data fechamento:</strong>

                        <span
                            class="text-muted"
                            th:text="${edital.dataFechamento}">
                        </span>

                    </div>

                    <hr class="my-4"/>

                    <div
                        th:if="${session.role == 'FORNECEDOR' and edital.status == 'ABERTO'}">

                        <h4 class="fw-bold text-success mb-3">
                            💰 Dar lance
                        </h4>

                        <form
                            action="/lances/criar"
                            method="post"
                            class="row g-3">

                            <input
                                type="hidden"
                                name="idEdital"
                                th:value="${edital.id}"/>

                            <div class="col-md-6">

                                <label class="form-label">
                                    Valor
                                </label>

                                <input
                                    type="number"
                                    step="0.01"
                                    name="valor"
                                    class="form-control"
                                    required/>

                            </div>

                            <div class="col-md-6">

                                <label class="form-label">
                                    Data do lance
                                </label>

                                <input
                                    type="date"
                                    name="dataLance"
                                    class="form-control"
                                    required/>

                            </div>

                            <div class="col-12">

                                <button
                                    type="submit"
                                    class="btn btn-success shadow-sm">

                                    🚀 Enviar lance

                                </button>

                            </div>

                        </form>

                    </div>

                    <div th:if="${edital.status == 'ENCERRADO'}">

                        <div
                            class="alert alert-warning border-0 shadow-sm mt-4">

                            <h5 class="fw-bold mb-2">
                                🏁 Edital encerrado
                            </h5>

                            <p class="mb-0">
                                Os lances foram finalizados.
                            </p>

                        </div>

                    </div>

                </div>

                <div th:if="${edital == null}">

                    <div class="alert alert-danger shadow-sm">

                        <h5 class="fw-bold mb-1">
                            ❌ Edital não encontrado
                        </h5>

                        <p class="mb-0">
                            O edital solicitado não existe ou foi removido.
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <footer class="text-center text-muted py-3">
        Sistema de Licitações © 2026
    </footer>

</body>
</html>
