<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">


    <body>

    <div th:replace="layout/header :: header"></div>

    <div style="padding:20px;">

        <h2>📄 Detalhes do Edital</h2>

        <div th:if="${edital != null}">

            <h3 th:text="${edital.titulo}">Título</h3>

            <p><b>Descrição:</b> <span th:text="${edital.descricao}"></span></p>

            <p>
                <b>Status:</b>

                <span th:if="${edital.status == 'ABERTO'}" style="color:green">
                    ABERTO
                </span>

                <span th:if="${edital.status == 'ENCERRADO'}" style="color:red">
                    ENCERRADO
                </span>
            </p>

            <p>
                <b>Data fechamento:</b>
                <span th:text="${edital.dataFechamento}"></span>
            </p>

            <hr/>

            <div th:if="${session.role == 'FORNECEDOR' and edital.status == 'ABERTO'}">

                <h3>💰 Dar lance</h3>

                <form action="/lances/criar" method="post">

                    <input type="hidden" name="idEdital" th:value="${edital.id}"/>

                    <label>Valor:</label>
                    <input type="number" step="0.01" name="valor" required/>

                    <br/><br/>

                    <label>Data do lance:</label>
                    <input type="date" name="dataLance" required/>

                    <br/><br/>

                    <button type="submit">Enviar lance</button>

                </form>

            </div>

            <div th:if="${edital.status == 'ENCERRADO'}">

                <h3>🏁 Edital encerrado</h3>

                <p>Os lances foram finalizados.</p>


            </div>

        </div>

        <div th:if="${edital == null}">
            <h3 style="color:red;">Edital não encontrado</h3>
        </div>

    </div>

    <div style="margin-top:40px;text-align:center;color:#777;">
        Sistema de Licitações © 2026
    </div>

    </body>
</html>
